<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DY0132 缺失数据统计展示</title>
  <style>
    :root {
      --bg: #f5f7f6;
      --card: #ffffff;
      --line: #d9e1dd;
      --text: #1f2a2e;
      --muted: #647177;
      --primary: #0f7665;
      --primary-soft: #e8f4f1;
      --secondary: #1f5d9a;
      --secondary-soft: #eaf1f8;
      --summary: #9a5c1f;
      --summary-soft: #fbf3ea;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
    }

    .header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .title {
      margin: 0 0 10px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .phase1 { background: var(--primary); }
    .phase3 { background: var(--secondary); }
    .all { background: var(--summary); }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .kpi {
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: #fff;
    }

    .kpi.phase1-bg { background: var(--primary-soft); border-color: #c8e2dc; }
    .kpi.phase3-bg { background: var(--secondary-soft); border-color: #caddf2; }
    .kpi.all-bg { background: var(--summary-soft); border-color: #f0d9c1; }

    .kpi .v {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 700;
    }

    .kpi .t {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 620px;
    }

    thead th {
      text-align: left;
      background: #f2f5f4;
      color: #37454b;
      font-weight: 600;
      padding: 10px 10px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    tbody td {
      padding: 9px 10px;
      border-bottom: 1px solid #edf1ef;
      vertical-align: top;
    }

    tbody tr:last-child td { border-bottom: none; }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .id {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .kpis { grid-template-columns: 1fr; }
      h1 { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>DY0132 缺失数据统计展示</h1>
      <div class="sub">统计范围：仅保留日期 ≥ 2026-01-01 的记录</div>
    </div>

    <section class="section">
      <h2 class="title"><span class="dot phase1"></span>一期情况统计</h2>
      <div class="kpis" id="phase1-kpis"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>店铺名</th>
              <th>店铺ID</th>
              <th class="num">记录数</th>
              <th class="num">涉及日期数</th>
            </tr>
          </thead>
          <tbody id="phase1-table"></tbody>
        </table>
      </div>
    </section>

    <section class="section">
      <h2 class="title"><span class="dot phase3"></span>三期情况统计</h2>
      <div class="kpis" id="phase3-kpis"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>店铺名</th>
              <th>店铺ID</th>
              <th class="num">记录数</th>
              <th class="num">涉及日期数</th>
            </tr>
          </thead>
          <tbody id="phase3-table"></tbody>
        </table>
      </div>
    </section>

    <section class="section">
      <h2 class="title"><span class="dot all"></span>整体任务情况汇总</h2>
      <div class="kpis" id="all-kpis"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>阶段</th>
              <th>店铺名</th>
              <th>店铺ID</th>
              <th class="num">记录数</th>
              <th class="num">涉及日期数</th>
            </tr>
          </thead>
          <tbody id="all-table"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>

          { shop_name: "麦富迪喜宠宠物专卖店", store_id: "144152929", record_count: 4, date_count: 3 },
          { shop_name: "佰萃官方旗舰店", store_id: "21825345", record_count: 1, date_count: 1 }
        ]
      },

          { shop_name: "奶弗宠物食品旗舰店", store_id: "216106895", record_count: 35, date_count: 23 },
          { shop_name: "营养森林官方旗舰店", store_id: "223286288", record_count: 13, date_count: 12 },
          { shop_name: "霸弗BARF麦富迪宠物专卖店", store_id: "250626311", record_count: 10, date_count: 10 },

        stores: [
          { phase: "一期", shop_name: "凤舞九天宠物食品专营店", store_id: "177974034", record_count: 61, date_count: 40 },
          { phase: "一期", shop_name: "凤舞九天宠物专营店", store_id: "146228995", record_count: 45, date_count: 26 },
          { phase: "三期", shop_name: "麦富迪官方旗舰店", store_id: "2236469", record_count: 42, date_count: 29 },

          { phase: "三期", shop_name: "霸弗BARF麦富迪宠物专卖店", store_id: "250626311", record_count: 10, date_count: 10 },
          { phase: "一期", shop_name: "麦富迪凤舞九天宠物专卖店", store_id: "185250245", record_count: 9, date_count: 9 },

          { phase: "三期", shop_name: "BARF霸弗宠物食品旗舰店", store_id: "34155233", record_count: 7, date_count: 7 },
          { phase: "三期", shop_name: "麦富迪双拼粮宠物食品旗舰店", store_id: "242291927", record_count: 7, date_count: 7 },
          { phase: "一期", shop_name: "麦富迪喜宠宠物专卖店", store_id: "144152929", record_count: 4, date_count: 3 },
          { phase: "一期", shop_name: "佰萃官方旗舰店", store_id: "21825345", record_count: 1, date_count: 1 }
        ]
      }
    };

    const nf = new Intl.NumberFormat("zh-CN");

    function renderKpis(containerId, cls, stats) {
      const el = document.getElementById(containerId);
      el.innerHTML = [
        `<div class="kpi ${cls}"><div class="v">${nf.format(stats.totalRecords)}</div><div class="t">记录总数</div></div>`,
        `<div class="kpi ${cls}"><div class="v">${nf.format(stats.totalStores)}</div><div class="t">涉及店铺数</div></div>`,
        `<div class="kpi ${cls}"><div class="v">${nf.format(stats.totalDates)}</div><div class="t">涉及日期数</div></div>`
      ].join("");
    }

    function renderPhaseTable(containerId, rows) {
      const el = document.getElementById(containerId);
      el.innerHTML = rows.map(r => `
        <tr>
          <td>${r.shop_name}</td>
          <td class="id">${r.store_id}</td>
          <td class="num">${nf.format(r.record_count)}</td>
          <td class="num">${nf.format(r.date_count)}</td>
        </tr>
      `).join("");
    }

    function renderAllTable(containerId, rows) {
      const el = document.getElementById(containerId);
      el.innerHTML = rows.map(r => `
        <tr>
          <td>${r.phase}</td>
          <td>${r.shop_name}</td>
          <td class="id">${r.store_id}</td>
          <td class="num">${nf.format(r.record_count)}</td>
          <td class="num">${nf.format(r.date_count)}</td>
        </tr>
      `).join("");
    }

    renderKpis("phase1-kpis", "phase1-bg", data.phase1);
    renderKpis("phase3-kpis", "phase3-bg", data.phase3);
    renderKpis("all-kpis", "all-bg", data.overall);

    renderPhaseTable("phase1-table", data.phase1.stores);
    renderPhaseTable("phase3-table", data.phase3.stores);
    renderAllTable("all-table", data.overall.stores);
  </script>
</body>
</html>
